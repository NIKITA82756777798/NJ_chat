<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анонимный чат /anon/</title>
    
    <!-- Подключаем Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        /* ===== Весь твой стиль остаётся без изменений ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            color: #ddd;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #444;
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            color: #ff6b6b;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .header .stats {
            font-size: 14px;
            color: #888;
        }

        .header .stats span {
            color: #ff6b6b;
            font-weight: bold;
        }

        .post-form {
            background: #252525;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        .post-form textarea {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 12px;
            color: #ddd;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            transition: border 0.2s;
        }

        .post-form textarea:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .post-form .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .post-form .form-actions .info {
            font-size: 13px;
            color: #777;
        }

        .post-form button {
            background: #ff6b6b;
            border: none;
            color: #1a1a1a;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        .post-form button:hover {
            background: #ff5252;
            transform: scale(1.02);
        }

        .thread {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post {
            background: #252525;
            border-radius: 12px;
            padding: 18px 20px;
            border-left: 4px solid #ff6b6b;
            border: 1px solid #333;
            border-left-width: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post .post-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .post .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            flex-shrink: 0;
            user-select: none;
        }

        .post .post-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .post .post-meta .tread-number {
            color: #ff6b6b;
            font-weight: bold;
            font-family: monospace;
        }

        .post .post-meta .time {
            color: #666;
            font-size: 13px;
        }

        .post .post-meta .reply-badge {
            background: #333;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
        }

        .post .post-content {
            font-size: 15px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
            margin-top: 4px;
        }

        .post .post-content .reply-to {
            color: #ff6b6b;
            background: #3a1a1a;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 6px;
        }

        .post .post-actions {
            margin-top: 12px;
            display: flex;
            gap: 15px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }

        .post .post-actions button {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .post .post-actions button:hover {
            background: #333;
            color: #ff6b6b;
        }

        .post .post-actions .delete-btn {
            margin-left: auto;
            color: #555;
        }

        .post .post-actions .delete-btn:hover {
            color: #ff4444;
            background: #3a1a1a;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 18px;
            border: 2px dashed #333;
            border-radius: 16px;
        }

        .empty span {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 22px;
            }

            .post-form .form-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .post-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <div class="header">
        <h1>▶ /anon/</h1>
        <div class="stats">
            Постов: <span id="postCount">0</span> &nbsp;|&nbsp; Онлайн: <span id="onlineCount">1</span>
        </div>
    </div>

    <!-- ===== ФОРМА СОЗДАНИЯ ПОСТА ===== -->
    <div class="post-form">
        <textarea id="postInput" placeholder="Твой анонимный пост... (без регистрации)"></textarea>
        <div class="form-actions">
            <div class="info">
                ⚡ Анонимно &bull; <span id="replyHint">Новый пост</span>
            </div>
            <button id="sendBtn">▶ Отправить</button>
        </div>
    </div>

    <!-- ===== ЛЕНТА ===== -->
    <div class="thread" id="thread"></div>

    <script>
        // =============================================
        //  НАСТРОЙКА FIREBASE (твои данные)
        // =============================================
        const firebaseConfig = {
            apiKey: "AIzaSyB0JhP7XKjZ7o5qQ8rW9vE2xXy3zA4bC5d",
            authDomain: "anon-chat-4e8f9.firebaseapp.com",
            databaseURL: "https://anon-chat-4e8f9-default-rtdb.firebaseio.com",
            projectId: "anon-chat-4e8f9",
            storageBucket: "anon-chat-4e8f9.appspot.com",
            messagingSenderId: "123456789012",
            appId: "1:123456789012:web:abcdef1234567890"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // =============================================
        //  ЛОГИКА РАБОТЫ
        // =============================================

        let posts = [];
        let replyTarget = null;
        let myUserId = null; // для возможности удалять свои посты

        const threadEl = document.getElementById('thread');
        const postInput = document.getElementById('postInput');
        const sendBtn = document.getElementById('sendBtn');
        const postCountEl = document.getElementById('postCount');
        const onlineCountEl = document.getElementById('onlineCount');
        const replyHintEl = document.getElementById('replyHint');

        // --- Генерация уникального ID для пользователя (сохраняется в сессии) ---
        function getUserId() {
            let id = sessionStorage.getItem('anon_user_id');
            if (!id) {
                id = 'user_' + Math.random().toString(36).substring(2, 10);
                sessionStorage.setItem('anon_user_id', id);
            }
            return id;
        }
        myUserId = getUserId();

        // --- Генерация цвета аватара ---
        function getAvatarColor(seed) {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#5f27cd', '#ff9ff3', '#f368e0', '#54a0ff', '#5f6c7a', '#00d2d3', '#ee5a24', '#6ab04c'];
            return colors[seed % colors.length];
        }

        function getAvatarLetter(text) {
            const cleaned = text.trim();
            if (!cleaned) return '?';
            const match = cleaned.match(/[a-zA-Zа-яА-Я]/);
            return match ? match[0].toUpperCase() : 'A';
        }

        // --- Создание объекта поста ---
        function createPostObject(text, replyToId = null, replyText = null) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });

            return {
                text: text.trim(),
                time: timeStr,
                date: dateStr,
                timestamp: now.getTime(),
                replyTo: replyToId,
                replyText: replyText,
                avatarLetter: getAvatarLetter(text),
                avatarColor: getAvatarColor(Math.floor(Math.random() * 1000)),
                userId: myUserId // для возможности удаления
            };
        }

        // --- Отправка поста в Firebase ---
        function sendPost(text, replyToId = null, replyText = null) {
            if (!text.trim()) return;

            const postData = createPostObject(text, replyToId, replyText);
            const newPostRef = database.ref('posts').push();
            postData.id = newPostRef.key; // добавляем ID от Firebase
            newPostRef.set(postData);
        }

        // --- Удаление поста из Firebase ---
        function deletePost(postId, userId) {
            if (!userId) return;
            database.ref('posts/' + postId).once('value', (snapshot) => {
                const post = snapshot.val();
                if (post && post.userId === userId) {
                    database.ref('posts/' + postId).remove();
                } else {
                    alert('Ты не можешь удалить этот пост!');
                }
            });
        }

        // --- Отрисовка ленты ---
        function renderPosts() {
            if (posts.length === 0) {
                threadEl.innerHTML = `
                    <div class="empty">
                        <span>🕳️</span>
                        Пока пусто...<br />
                        <small style="color:#444;">Будь первым аноном!</small>
                    </div>
                `;
                updateStats();
                return;
            }

            const sorted = [...posts].sort((a, b) => a.timestamp - b.timestamp);

            let html = '';
            for (const post of sorted) {
                let replyHtml = '';
                if (post.replyTo && post.replyText) {
                    replyHtml = `
                        <div class="reply-to">
                            ⤷ Ответ на пост #${post.replyTo}: «${post.replyText}»
                        </div>
                    `;
                }

                html += `
                    <div class="post" id="post-${post.id}">
                        <div class="post-header">
                            <div class="avatar" style="background:${post.avatarColor}">
                                ${post.avatarLetter}
                            </div>
                            <div class="post-meta">
                                <span class="tread-number">#${post.id}</span>
                                <span class="time">${post.date} ${post.time}</span>
                                ${post.replyTo ? `<span class="reply-badge">↳ ответ</span>` : ''}
                            </div>
                        </div>
                        <div class="post-content">
                            ${replyHtml}
                            ${escapeHtml(post.text)}
                        </div>
                        <div class="post-actions">
                            <button class="reply-btn" data-id="${post.id}">↩ Ответить</button>
                            ${post.userId === myUserId ? `<button class="delete-btn" data-id="${post.id}">✕ Удалить</button>` : ''}
                        </div>
                    </div>
                `;
            }

            threadEl.innerHTML = html;
            updateStats();

            // Обработчики кнопок
            document.querySelectorAll('.reply-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const post = posts.find(p => p.id === id);
                    if (post) {
                        replyTarget = { id: post.id, text: post.text };
                        replyHintEl.textContent = `Ответ на #${post.id}`;
                        postInput.focus();
                        document.querySelectorAll('.post').forEach(el => el.style.borderLeftColor = '#333');
                        const targetEl = document.getElementById(`post-${id}`);
                        if (targetEl) targetEl.style.borderLeftColor = '#ff6b6b';
                    }
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    const post = posts.find(p => p.id === id);
                    if (post && post.userId === myUserId) {
                        if (confirm(`Удалить пост #${id}?`)) {
                            deletePost(id, myUserId);
                            if (replyTarget && replyTarget.id === id) clearReply();
                        }
                    }
                });
            });

            // Скролл к последнему посту
            const lastPost = threadEl.lastElementChild;
            if (lastPost && lastPost.classList.contains('post')) {
                lastPost.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStats() {
            postCountEl.textContent = posts.length;
        }

        function clearReply() {
            replyTarget = null;
            replyHintEl.textContent = 'Новый пост';
            document.querySelectorAll('.post').forEach(el => el.style.borderLeftColor = '#ff6b6b');
        }

        // --- Обработка отправки ---
        function handleSend() {
            const text = postInput.value.trim();
            if (!text) {
                alert('Напиши хоть что-то, анон!');
                return;
            }

            const replyId = replyTarget ? replyTarget.id : null;
            const replyText = replyTarget ? replyTarget.text : null;
            sendPost(text, replyId, replyText);

            postInput.value = '';
            clearReply();
            postInput.focus();
        }

        // --- Слушаем изменения в Firebase ---
        function listenPosts() {
            database.ref('posts').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    posts = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                } else {
                    posts = [];
                }
                renderPosts();
            });
        }

        // --- Слушаем онлайн (примитивный счётчик) ---
        function updateOnline() {
            const onlineRef = database.ref('online');
            onlineRef.on('value', (snapshot) => {
                const count = snapshot.val() || 0;
                onlineCountEl.textContent = count;
            });

            // Добавляем себя в онлайн
            const userOnlineRef = database.ref('online/' + myUserId);
            userOnlineRef.set(true);
            userOnlineRef.onDisconnect().remove();
        }

        // --- Инициализация ---
        function init() {
            listenPosts();
            updateOnline();

            sendBtn.addEventListener('click', handleSend);
            postInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    handleSend();
                }
                if (e.key === 'Escape') {
                    clearReply();
                    postInput.blur();
                }
            });

            postInput.focus();
        }

        init();
    </script>

</body>
</html>
